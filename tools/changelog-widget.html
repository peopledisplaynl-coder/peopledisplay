<!-- PeopleDisplay Changelog Widget — paste into a WordPress Custom HTML block -->
<div id="pd-changelog-widget">
  <div id="pd-changelog-loading">Changelog laden&hellip;</div>
  <div id="pd-changelog-error" style="display:none;">
    <p>&#x26A0;&#xFE0F; Kan de changelog momenteel niet ophalen. Probeer het later opnieuw.</p>
  </div>
  <div id="pd-changelog-list" style="display:none;"></div>
</div>

<style>
#pd-changelog-widget {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  font-size: 15px;
  color: #1a1a2e;
  max-width: 760px;
  margin: 0 auto;
  line-height: 1.6;
}

#pd-changelog-loading {
  padding: 24px 0;
  color: #888;
  font-style: italic;
}

#pd-changelog-error {
  background: #fff4f4;
  border-left: 4px solid #e74c3c;
  padding: 14px 18px;
  border-radius: 4px;
  color: #c0392b;
}

.pd-version-block {
  margin-bottom: 32px;
  border-bottom: 1px solid #e8e8ed;
  padding-bottom: 28px;
}

.pd-version-block:last-child {
  border-bottom: none;
  margin-bottom: 0;
  padding-bottom: 0;
}

.pd-version-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
}

.pd-version-badge {
  display: inline-block;
  background: #1a1a2e;
  color: #fff;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.04em;
  padding: 3px 10px;
  border-radius: 20px;
  white-space: nowrap;
}

.pd-version-badge.pd-latest {
  background: #2ecc71;
}

.pd-version-date {
  font-size: 13px;
  color: #999;
}

.pd-version-changes {
  margin: 0;
  padding: 0 0 0 20px;
  list-style: disc;
}

.pd-version-changes li {
  margin-bottom: 5px;
  color: #333;
}
</style>

<script>
(function () {
  var FEED_URL = "https://admin.peopledisplay.nl/api/changelog.php";

  var elLoading = document.getElementById("pd-changelog-loading");
  var elError   = document.getElementById("pd-changelog-error");
  var elList    = document.getElementById("pd-changelog-list");

  fetch(FEED_URL)
    .then(function (res) {
      if (!res.ok) throw new Error("HTTP " + res.status);
      return res.json();
    })
    .then(function (data) {
      elLoading.style.display = "none";

      var releases = Array.isArray(data.changelog) ? data.changelog : [];
      if (releases.length === 0) {
        elError.style.display = "block";
        elError.querySelector("p").textContent = "Geen changelog-gegevens gevonden.";
        return;
      }

      var html = "";
      releases.forEach(function (release, index) {
        var version = release.version || "–";
        var date    = release.date    || "";
        var changes = Array.isArray(release.changes) ? release.changes : [];
        var isLatest = (index === 0);

        var badgeClass = "pd-version-badge" + (isLatest ? " pd-latest" : "");
        var latestLabel = isLatest ? " &nbsp;&#x2713; Nieuwste" : "";

        html += '<div class="pd-version-block">';
        html +=   '<div class="pd-version-header">';
        html +=     '<span class="' + badgeClass + '">v' + escHtml(version) + latestLabel + '</span>';
        if (date) {
          html +=   '<span class="pd-version-date">' + escHtml(formatDate(date)) + '</span>';
        }
        html +=   '</div>';

        if (changes.length > 0) {
          html += '<ul class="pd-version-changes">';
          changes.forEach(function (change) {
            html += '<li>' + escHtml(change) + '</li>';
          });
          html += '</ul>';
        }

        html += '</div>';
      });

      elList.innerHTML = html;
      elList.style.display = "block";
    })
    .catch(function () {
      elLoading.style.display = "none";
      elError.style.display = "block";
    });

  function escHtml(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function formatDate(dateStr) {
    try {
      var d = new Date(dateStr);
      if (isNaN(d.getTime())) return dateStr;
      return d.toLocaleDateString("nl-NL", { year: "numeric", month: "long", day: "numeric" });
    } catch (e) {
      return dateStr;
    }
  }
})();
</script>
